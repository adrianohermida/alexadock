version: '3.8'

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_DB: lawdesk_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d lawdesk_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/lawdesk_db
      SECRET_KEY: sua_chave_secreta_muito_segura_aqui_mude_em_producao
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3
      ESP32_BASE_URL: http://host.docker.internal:8001 # Ou o IP real do seu ESP32 na rede
    volumes:
      - ./backend/chroma_data:/app/chroma_data # Persistir dados do ChromaDB
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      VITE_API_URL: http://localhost:8000 # Para o navegador acessar o backend via proxy
    depends_on:
      - backend

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    command: serve

volumes:
  postgres_data:
  ollama_data:
